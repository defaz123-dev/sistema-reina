{% extends "layout.html" %}
{% block title %}Configuración de Empresa - Sanduches La Reina{% endblock %}

{% block navbar %}
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold text-success" href="{{ url_for('dashboard') }}">SANDUCHES LA REINA</a>
        <a href="{{ url_for('dashboard') }}" class="btn btn-success btn-sm rounded-pill px-3"><i class="fas fa-home me-1"></i> Inicio</a>
    </div>
</nav>
{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h2 class="brand-logo"><i class="fas fa-building me-2"></i>Datos de la Empresa</h2>
        <p class="text-muted small">Información necesaria para la emisión de comprobantes.</p>
    </div>
</div>

<div class="card border-0 shadow-sm rounded-4">
    <div class="card-body p-4">
        <form action="{{ url_for('guardar_empresa') }}" method="POST">
            <input type="hidden" name="id" value="{{ empresa.id if empresa else '' }}">
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="small fw-bold text-muted text-primary">RUC del Emisor</label>
                    <input type="text" name="ruc" class="form-control bg-light border-0" value="{{ empresa.ruc if empresa else '' }}" required maxlength="13">
                </div>
                <div class="col-md-8 mb-3">
                    <label class="small fw-bold text-muted">Razón Social</label>
                    <input type="text" name="razon_social" class="form-control bg-light border-0 force-upper" value="{{ empresa.razon_social if empresa else '' }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="small fw-bold text-muted">Nombre Comercial</label>
                    <input type="text" name="nombre_comercial" class="form-control bg-light border-0 force-upper" value="{{ empresa.nombre_comercial if empresa else '' }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="small fw-bold text-muted">Ambiente SRI</label>
                    <select name="ambiente" class="form-select bg-light border-0">
                        <option value="1" {{ 'selected' if empresa and empresa.ambiente == 1 else '' }}>PRUEBAS</option>
                        <option value="2" {{ 'selected' if empresa and empresa.ambiente == 2 else '' }}>PRODUCCIÓN</option>
                    </select>
                </div>
                <div class="col-12 mb-4">
                    <label class="small fw-bold text-muted">Dirección Matriz</label>
                    <input type="text" name="direccion_matriz" class="form-control bg-light border-0 force-upper" value="{{ empresa.direccion_matriz if empresa else '' }}" required>
                </div>
            </div>
            <hr class="my-4">
            <div class="text-end">
                <button type="submit" class="btn btn-reina rounded-pill px-5 py-2 fw-bold">
                    <i class="fas fa-save me-2"></i> GUARDAR CONFIGURACIÓN
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
