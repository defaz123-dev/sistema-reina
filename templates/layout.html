<!-- templates/layout.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sanduches La Reina{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- DataTables CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/dataTables.bootstrap5.min.css">
    <style>
        :root { --reina-green: #008938; --reina-yellow: #ffc20e; --reina-dark: #212529; --reina-light: #f8f9fa; }
        body { background: #f0f2f5; min-height: 100vh; font-family: 'Segoe UI', sans-serif; {% block body_style %}{% endblock %} }
        .brand-logo { color: var(--reina-green); font-weight: 800; letter-spacing: -1px; }
        .card { border: none; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .btn-reina { background-color: var(--reina-green); border: none; color: white; border-radius: 10px; font-weight: 600; transition: all 0.3s; }
        .btn-reina:hover { background-color: #00702e; color: white; transform: translateY(-1px); }
        .btn-reina-secondary { background-color: var(--reina-yellow); border: none; color: var(--reina-dark); border-radius: 10px; font-weight: 600; }
        .form-control, .form-select { 
            border-radius: 8px !important; 
            border: 1px solid #adb5bd !important;
            padding: 8px 12px !important;
            background-color: #ffffff !important;
            color: #212529 !important;
            transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out !important;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--reina-green) !important;
            box-shadow: 0 0 0 0.2rem rgba(0, 137, 56, 0.1) !important;
            outline: 0 !important;
        }
        .form-control::placeholder {
            color: #adb5bd !important;
            opacity: 1;
        }
        .force-upper { text-transform: uppercase; }
        input::placeholder { text-transform: none; }
        
        /* Contenedor de mensajes flotante */
        .flash-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            width: 350px;
            max-width: 90vw;
        }

        /* Ajustes para DataTables */
        .dataTables_wrapper .dataTables_length select {
            width: auto !important;
            display: inline-block !important;
            padding: 4px 30px 4px 10px !important;
            margin: 0 5px !important;
            border-radius: 6px !important;
            height: auto !important;
        }
        .dataTables_wrapper .dataTables_filter input {
            width: 250px !important;
            display: inline-block !important;
            padding: 5px 12px !important;
            margin-left: 10px !important;
            border-radius: 6px !important;
            height: auto !important;
        }
        .dataTables_wrapper .dataTables_info, .dataTables_wrapper .dataTables_paginate {
            padding-top: 15px !important;
            font-size: 0.85rem !important;
        }
    </style>
</head>
<body>

{% block navbar %}{% endblock %}

<div class="flash-container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show shadow-lg border-0 mb-2" role="alert">
            <i class="fas fa-info-circle me-2"></i> {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
      {% endif %}
    {% endwith %}
</div>

<div class="container py-4">
    {% block content %}{% endblock %}
</div>

<!-- Modal Genérico para Alertas -->
<div class="modal fade" id="reinaModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" style="max-width: 350px;">
        <div class="modal-content border-0 rounded-4 shadow-lg text-center">
            <div class="modal-header border-0 pb-0">
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4 pt-0">
                <div id="modalIcon" class="mb-3" style="font-size: 3rem;"></div>
                <h5 id="modalTitle" class="fw-bold"></h5>
                <p id="modalMessage" class="text-muted small mb-4"></p>
                <div class="d-flex gap-2 justify-content-center">
                    <button type="button" id="btnModalCancel" class="btn btn-light px-4 rounded-pill d-none" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" id="btnModalOk" class="btn btn-reina px-4 rounded-pill">Aceptar</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Scripts al final del Body -->
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    const rModal = new bootstrap.Modal(document.getElementById('reinaModal'));
    function reinaAlert(titulo, mensaje, tipo = 'success') {
        return new Promise((resolve) => {
            const icon = document.getElementById('modalIcon');
            document.getElementById('modalTitle').textContent = titulo;
            document.getElementById('modalMessage').innerHTML = mensaje;
            icon.className = 'mb-3 ' + (tipo === 'success' ? 'text-success' : 'text-danger');
            icon.innerHTML = tipo === 'success' ? '<i class="fas fa-check-circle"></i>' : '<i class="fas fa-times-circle"></i>';
            document.getElementById('btnModalCancel').classList.add('d-none');
            document.getElementById('btnModalOk').onclick = () => { rModal.hide(); resolve(true); };
            rModal.show();
        });
    }
    function reinaConfirm(titulo, mensaje) {
        return new Promise((resolve) => {
            document.getElementById('modalTitle').textContent = titulo;
            document.getElementById('modalMessage').innerHTML = mensaje;
            document.getElementById('modalIcon').className = 'mb-3 text-primary';
            document.getElementById('modalIcon').innerHTML = '<i class="fas fa-question-circle"></i>';
            document.getElementById('btnModalCancel').classList.remove('d-none');
            const cancelBtn = document.getElementById('btnModalCancel');
            const okBtn = document.getElementById('btnModalOk');
            okBtn.onclick = () => { rModal.hide(); resolve(true); };
            cancelBtn.onclick = () => { rModal.hide(); resolve(false); };
            rModal.show();
        });
    }
    function exportTableToExcel(tableID, filename = 'reporte') {
        const table = document.getElementById(tableID);
        const wb = XLSX.utils.table_to_book(table, { sheet: "Hoja1" });
        XLSX.writeFile(wb, filename + ".xlsx");
    }
</script>

{% block scripts %}{% endblock %}

</body>
</html>
